<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Storage Example</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        form { margin-bottom: 20px; }
        label { display: block; margin: 10px 0 5px; }
        input, textarea { width: 100%; padding: 10px; }
        button { padding: 10px 15px; background-color: blue; color: white; border: none; cursor: pointer; }
        button:hover { background-color: darkblue; }
    </style>
</head>
<body>
    <h1>Submit Your Data</h1>
    <form id="dataForm">
        <label for="dataInput">Your Data:</label>
        <textarea id="dataInput" required></textarea>
        <button type="submit">Submit</button>
    </form>
    <script>
        document.getElementById('dataForm').addEventListener('submit', function (event) {
            event.preventDefault();
            const dataInput = document.getElementById('dataInput').value;
            saveData(dataInput);
            document.getElementById('dataForm').reset();
        });

        function saveData(data) {
            // Fetch API to save data to data.json file
            fetch('data.json', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ response: data })
            })
            .then(response => response.json())
            .then(data => console.log('Data saved:', data))
            .catch(error => console.error('Error:', error));
        }
    </script>
</body>
</html>
