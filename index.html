<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>问卷收集</title>
    <style>
        .container {
            max-width: 600px;
            margin: 20px auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .question {
            margin-bottom: 15px;
        }
        textarea {
            width: 100%;
            height: 80px;
            margin-top: 5px;
        }
        button {
            padding: 8px 16px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .responses {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #ccc;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>问卷填写</h2>
        <form id="questionnaire">
            <div class="question">
                <label>1. 在干什么呀？</label><br>
                <textarea name="activity" required></textarea>
            </div>
            <div class="question">
                <label>2. 不高兴嘛？</label><br>
                <textarea name="mood" required></textarea>
            </div>
            <div class="question">
                <label>3. 对小元的评价呀</label><br>
                <textarea name="evaluation" required></textarea>
            </div>
            <button type="submit">提交</button>
        </form>

        <div class="responses">
            <h3>已填写内容</h3>
            <div id="responseList"></div>
        </div>
    </div>

    <script>
        const form = document.getElementById('questionnaire');
        const responseList = document.getElementById('responseList');

        // 从本地存储加载已保存的回复
        function loadResponses() {
            const responses = JSON.parse(localStorage.getItem('questionnaireResponses') || '[]');
            responses.forEach(addResponseToDOM);
        }

        // 添加回复到页面
        function addResponseToDOM(response) {
            const div = document.createElement('div');
            div.className = 'response-item';
            div.style.margin = '10px 0';
            div.style.padding = '10px';
            div.style.border = '1px solid #eee';
            div.innerHTML = `
                <p><strong>在干什么：</strong>${response.activity}</p>
                <p><strong>心情：</strong>${response.mood}</p>
                <p><strong>对小元的评价：</strong>${response.evaluation}</p>
                <hr>
            `;
            responseList.prepend(div); // 新回复显示在前面
        }

        // 提交表单时处理
        form.addEventListener('submit', function(e) {
            e.preventDefault(); // 阻止页面跳转

            // 获取表单数据
            const formData = new FormData(form);
            const response = {
                activity: formData.get('activity'),
                mood: formData.get('mood'),
                evaluation: formData.get('evaluation'),
                time: new Date().toLocaleString()
            };

            // 保存到本地存储
            const responses = JSON.parse(localStorage.getItem('questionnaireResponses') || '[]');
            responses.push(response);
            localStorage.setItem('questionnaireResponses', JSON.stringify(responses));

            // 添加到页面显示
            addResponseToDOM(response);

            // 重置表单
            form.reset();
        });

        // 页面加载时加载已有的回复
        loadResponses();
    </script>
</body>
</html>
