<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小元的问卷</title>
    <style>
        body {
            font-family: 微软雅黑, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #333;
        }
        .question {
            margin-bottom: 25px;
        }
        .question p {
            font-size: 18px;
            color: #555;
            margin-bottom: 10px;
        }
        input[type="text"], textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            box-sizing: border-box;
        }
        textarea {
            min-height: 100px;
            resize: vertical;
        }
        button {
            width: 100%;
            padding: 15px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
        .success {
            color: green;
            text-align: center;
            margin-top: 20px;
            display: none;
        }
        .error {
            color: red;
            text-align: center;
            margin-top: 20px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>问卷收集</h1>
        
        <div class="question">
            <p>*01 你现在正在干什么呀？</p>
            <input type="text" id="q1" placeholder="请输入...">
        </div>
        
        <div class="question">
            <p>*02 可以不要不高兴嘛</p>
            <input type="text" id="q2" placeholder="请输入...">
        </div>
        
        <div class="question">
            <p>*03 有什么想跟小元说的呢（亲亲）</p>
            <textarea id="q3" placeholder="请输入..."></textarea>
        </div>
        
        <button onclick="submitForm()">提交</button>
        <p class="success" id="successMsg">提交成功，感谢你的反馈！</p>
        <p class="error" id="errorMsg">提交失败，请稍后再试~</p>
    </div>

    <script>
        // 已替换为你的腾讯文档表单链接
        const TENCENT_FORM_URL = "https://docs.qq.com/form/page/DRUZxcmxHZUd3d0NN";

        async function submitForm() {
            const q1 = document.getElementById('q1').value;
            const q2 = document.getElementById('q2').value;
            const q3 = document.getElementById('q3').value;
            
            if (!q1 || !q2 || !q3) {
                alert('请填写所有问题哦~');
                return;
            }

            try {
                const formUrl = `${TENCENT_FORM_URL}?entry=1&q1=${encodeURIComponent(q1)}&q2=${encodeURIComponent(q2)}&q3=${encodeURIComponent(q3)}`;
                window.location.href = formUrl;
                document.getElementById('successMsg').style.display = 'block';
            } catch (err) {
                document.getElementById('errorMsg').style.display = 'block';
            }
        }
    </script>
</body>
</html>
